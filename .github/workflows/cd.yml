name: CD — Keep-Alive Streamlit App

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  ping-streamlit:
    name: Ping Streamlit App (Playwright)
    runs-on: ubuntu-latest

    steps:
      - name: Configurer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installer Playwright et Chromium
        run: |
          mkdir -p /tmp/pw && cd /tmp/pw
          npm install playwright
          npx playwright install --with-deps chromium

      - name: Visiter l'application Streamlit avec un vrai navigateur
        run: |
          cat > /tmp/pw/keepalive.js << 'EOF'
          const { chromium } = require('playwright');

          (async () => {
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage();
            try {
              console.log('Navigation vers https://mcugraph.streamlit.app/ ...');
              await page.goto('https://mcugraph.streamlit.app/', {
                waitUntil: 'networkidle',
                timeout: 120000,
              });

              // Attendre que le spinner de chargement Streamlit disparaisse
              await page.waitForSelector('[data-testid="stSpinner"]', {
                state: 'hidden',
                timeout: 120000,
              }).catch(() => console.log('Pas de spinner détecté (app déjà active).'));

              // Attendre activement que stApp soit visible (au lieu de juste vérifier)
              console.log('Attente du rendu de stApp...');
              await page.waitForSelector('[data-testid="stApp"]', {
                state: 'visible',
                timeout: 120000,
              });

              console.log('Succès : session WebSocket établie, application active.');
            } finally {
              await browser.close();
            }
          })();
          EOF
          node /tmp/pw/keepalive.js
