name: CD — Keep-Alive Streamlit App

on:
  schedule:
    # Visite quotidienne à 9h00 UTC — Streamlit Community Cloud endort les apps
    # après 7 jours d'inactivité ; une interaction réelle par jour suffit.
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  ping-streamlit:
    name: Ping Streamlit App (Selenium)
    runs-on: ubuntu-latest

    steps:
      - name: Installer Selenium + WebDriver Manager
        run: pip install selenium webdriver-manager

      - name: Interagir avec l'application Streamlit via Selenium headless
        run: |
          python3 - << 'PYEOF'
          import time
          from selenium import webdriver
          from selenium.webdriver.chrome.service import Service
          from selenium.webdriver.chrome.options import Options
          from selenium.webdriver.common.by import By
          from selenium.webdriver.support.ui import WebDriverWait
          from selenium.webdriver.support import expected_conditions as EC
          from webdriver_manager.chrome import ChromeDriverManager

          URL          = "https://mcugraph.streamlit.app/"
          TIMEOUT_WAKE = 20   # délai max pour détecter l'écran de veille
          TIMEOUT_LOAD = 180  # délai max pour le démarrage complet (cold start)

          opts = Options()
          opts.add_argument("--headless=new")
          opts.add_argument("--no-sandbox")
          opts.add_argument("--disable-dev-shm-usage")
          opts.add_argument("--disable-gpu")
          opts.add_argument("--window-size=1920,1080")
          # User-agent réaliste pour éviter les blocages anti-bot
          opts.add_argument(
              "--user-agent=Mozilla/5.0 (X11; Linux x86_64) "
              "AppleWebKit/537.36 (KHTML, like Gecko) "
              "Chrome/124.0.0.0 Safari/537.36"
          )

          driver = webdriver.Chrome(
              service=Service(ChromeDriverManager().install()),
              options=opts,
          )

          try:
              # ── 1. Chargement de la page ───────────────────────────────
              print(f"Navigation vers {URL} ...")
              driver.get(URL)
              time.sleep(5)
              print(f"URL : {driver.current_url} | Titre : {driver.title}")

              # ── 2. Gérer l'écran de veille Streamlit ──────────────────
              # Quand l'app dort, Streamlit affiche un bouton
              # "Yes, get this app back up!" avant de démarrer.
              try:
                  wakeup_btn = WebDriverWait(driver, TIMEOUT_WAKE).until(
                      EC.element_to_be_clickable((
                          By.XPATH,
                          '//button[contains(translate(., '
                          '"ABCDEFGHIJKLMNOPQRSTUVWXYZ",'
                          '"abcdefghijklmnopqrstuvwxyz"), '
                          '"get this app back up")]'
                      ))
                  )
                  print("Écran de veille détecté — clic sur le bouton de réveil...")
                  wakeup_btn.click()
                  time.sleep(10)
              except Exception:
                  print("Pas d'écran de veille — application déjà active.")

              # ── 3. Attendre la sidebar (indicateur fiable de chargement) ─
              # data-testid="stApp" est le shell React, présent immédiatement.
              # data-testid="stSidebar" n'apparaît qu'après l'établissement
              # de la WebSocket et le rendu complet des widgets Streamlit.
              wait = WebDriverWait(driver, TIMEOUT_LOAD)
              try:
                  wait.until(EC.presence_of_element_located(
                      (By.CSS_SELECTOR, '[data-testid="stSidebar"]')
                  ))
                  print("Sidebar visible — application pleinement chargée.")
              except Exception:
                  driver.save_screenshot("/tmp/selenium_timeout.png")
                  all_testids = [
                      e.get_attribute("data-testid")
                      for e in driver.find_elements(By.CSS_SELECTOR, "[data-testid]")
                  ]
                  print(f"ERREUR — sidebar introuvable après {TIMEOUT_LOAD}s.")
                  print(f"data-testid présents : {all_testids[:15]}")
                  raise

              # ── 4. Attendre la fin du spinner initial ──────────────────
              try:
                  wait.until(EC.invisibility_of_element_located(
                      (By.CSS_SELECTOR, '[data-testid="stSpinner"]')
                  ))
                  print("Chargement initial terminé.")
              except Exception:
                  print("Pas de spinner — application déjà prête.")

              time.sleep(5)  # stabilisation WebSocket

              # ── 5. Ouvrir le selectbox "Choisissez un film" ────────────
              selectbox = wait.until(EC.element_to_be_clickable(
                  (By.CSS_SELECTOR, '[data-testid="stSelectbox"]')
              ))
              # scrollIntoView pour s'assurer que l'élément est visible
              driver.execute_script("arguments[0].scrollIntoView(true);", selectbox)
              time.sleep(1)
              selectbox.click()
              print("Selectbox ouvert.")
              time.sleep(2)  # laisser le temps au portail de s'ouvrir

              # ── 6. Sélectionner le premier vrai film (index 1) ─────────
              # L'index 0 est "-- Tous les films --"
              options = wait.until(EC.presence_of_all_elements_located(
                  (By.CSS_SELECTOR, 'li[role="option"]')
              ))
              print(f"{len(options)} option(s) disponible(s).")

              target = options[1] if len(options) > 1 else options[0]
              film_name = target.text
              # Clic JS — plus fiable que le clic natif Selenium pour les portails
              driver.execute_script("arguments[0].click();", target)
              print(f"Film sélectionné : «{film_name}»")

              # ── 7. Attendre que le graphe se recharge ──────────────────
              time.sleep(8)
              try:
                  wait.until(EC.invisibility_of_element_located(
                      (By.CSS_SELECTOR, '[data-testid="stSpinner"]')
                  ))
                  print("Graphe rechargé.")
              except Exception:
                  print("Graphe prêt (pas de spinner secondaire).")

              # ── 8. Maintenir la session active ≥ 1 minute ─────────────
              # 6 cycles × 10 s = 60 s d'activité réelle (scroll alterné)
              print("Simulation d'activité sur le graphe (≥ 1 minute)...")
              for cycle in range(6):
                  driver.execute_script("window.scrollBy(0, 400)")
                  time.sleep(5)
                  driver.execute_script("window.scrollBy(0, -400)")
                  time.sleep(5)
                  print(f"  Cycle {cycle + 1}/6 — session WebSocket active.")

              print("Succès : application maintenue vivante pendant > 1 minute.")

          finally:
              driver.save_screenshot("/tmp/selenium_final.png")
              driver.quit()
          PYEOF

      - name: Uploader les captures d'écran
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-screenshots
          path: /tmp/selenium_*.png
          if-no-files-found: ignore
