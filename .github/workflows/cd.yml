name: CD — Keep-Alive Streamlit App

on:
  schedule:
    # Visite quotidienne à 9h00 UTC — Streamlit Community Cloud endort les apps
    # après 7 jours d'inactivité ; une vraie session navigateur par jour suffit.
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  ping-streamlit:
    name: Ping Streamlit App (Selenium)
    runs-on: ubuntu-latest

    steps:
      - name: Installer Selenium + WebDriver Manager
        run: pip install selenium webdriver-manager

      - name: Interagir avec l'application Streamlit via Selenium headless
        run: |
          npm install -g playwright
          npx playwright install --with-deps chromium

      - name: Visiter l'application Streamlit avec un vrai navigateur
        run: |
          cat > /tmp/keepalive.js << 'EOF'
          const { chromium } = require('playwright');

          (async () => {
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage();
            try {
              console.log('Navigation vers https://mcugraph.streamlit.app/ ...');
              await page.goto('https://mcugraph.streamlit.app/', {
                waitUntil: 'networkidle',
                timeout: 120000,
              });

              // Attendre que le spinner de chargement Streamlit disparaisse
              await page.waitForSelector('[data-testid="stSpinner"]', {
                state: 'hidden',
                timeout: 120000,
              }).catch(() => console.log('Pas de spinner détecté (app déjà active).'));

              // Vérifier que le conteneur principal est bien rendu
              const appVisible = await page.locator('[data-testid="stApp"]').isVisible();
              if (!appVisible) throw new Error('stApp non visible — application non chargée.');

              console.log('Succès : session WebSocket établie, application active.');
            } finally {
              await browser.close();
            }
          })();
          EOF
          node /tmp/keepalive.js
