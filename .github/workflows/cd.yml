name: CD — Keep-Alive Streamlit App

on:
  schedule:
    # Visite quotidienne à 9h00 UTC — Streamlit Community Cloud endort les apps
    # après 7 jours d'inactivité ; une interaction réelle par jour suffit.
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  ping-streamlit:
    name: Ping Streamlit App (Selenium)
    runs-on: ubuntu-latest

    steps:
      - name: Installer Selenium + WebDriver Manager
        run: pip install selenium webdriver-manager

      - name: Interagir avec l'application Streamlit via Selenium headless
        run: |
          python3 - << 'PYEOF'
          import time
          from selenium import webdriver
          from selenium.webdriver.chrome.service import Service
          from selenium.webdriver.chrome.options import Options
          from selenium.webdriver.common.by import By
          from selenium.webdriver.support.ui import WebDriverWait
          from selenium.webdriver.support import expected_conditions as EC
          from webdriver_manager.chrome import ChromeDriverManager

          URL     = "https://mcugraph.streamlit.app/"
          TIMEOUT = 120  # secondes max pour chaque attente

          opts = Options()
          opts.add_argument("--headless=new")
          opts.add_argument("--no-sandbox")
          opts.add_argument("--disable-dev-shm-usage")
          opts.add_argument("--disable-gpu")
          opts.add_argument("--window-size=1920,1080")

          driver = webdriver.Chrome(
              service=Service(ChromeDriverManager().install()),
              options=opts,
          )
          wait = WebDriverWait(driver, TIMEOUT)

          try:
              # ── 1. Chargement de l'application ────────────────────────
              print(f"Navigation vers {URL} ...")
              driver.get(URL)

              wait.until(EC.presence_of_element_located(
                  (By.CSS_SELECTOR, '[data-testid="stApp"]')
              ))
              print("stApp visible.")

              # ── 2. Attendre la fin du spinner initial ─────────────────
              try:
                  wait.until(EC.invisibility_of_element_located(
                      (By.CSS_SELECTOR, '[data-testid="stSpinner"]')
                  ))
                  print("Chargement initial terminé.")
              except Exception:
                  print("Pas de spinner détecté — application déjà active.")

              time.sleep(5)  # stabilisation

              # ── 3. Ouvrir le selectbox "Choisissez un film" ───────────
              # Streamlit rend chaque selectbox avec data-testid="stSelectbox"
              # Le premier dans la sidebar correspond à la sélection du film.
              selectbox = wait.until(EC.element_to_be_clickable(
                  (By.CSS_SELECTOR, '[data-testid="stSelectbox"]')
              ))
              selectbox.click()
              print("Selectbox ouvert.")
              time.sleep(1)

              # ── 4. Sélectionner le premier film de la liste ───────────
              # Les options Streamlit sont des <li role="option">
              # L'index 0 est "-- Tous les films --", on prend l'index 1.
              options = wait.until(EC.presence_of_all_elements_located(
                  (By.CSS_SELECTOR, 'li[role="option"]')
              ))
              print(f"{len(options)} option(s) disponible(s) dans le selectbox.")

              target = options[1] if len(options) > 1 else options[0]
              film_name = target.text
              target.click()
              print(f"Film sélectionné : «{film_name}»")

              # ── 5. Attendre que le graphe se recharge ─────────────────
              time.sleep(8)
              try:
                  wait.until(EC.invisibility_of_element_located(
                      (By.CSS_SELECTOR, '[data-testid="stSpinner"]')
                  ))
                  print("Graphe rechargé.")
              except Exception:
                  print("Graphe prêt (pas de spinner secondaire).")

              # ── 6. Maintenir la session active ≥ 1 minute ─────────────
              # 6 cycles × 10 s = 60 s d'activité réelle (scroll alterné)
              print("Simulation d'activité sur le graphe (≥ 1 minute)...")
              for cycle in range(6):
                  driver.execute_script("window.scrollBy(0, 400)")
                  time.sleep(5)
                  driver.execute_script("window.scrollBy(0, -400)")
                  time.sleep(5)
                  print(f"  Cycle {cycle + 1}/6 — session WebSocket active.")

              print("Succès : application maintenue vivante pendant > 1 minute.")

          finally:
              driver.quit()
          PYEOF
